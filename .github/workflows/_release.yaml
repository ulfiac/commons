name: _release
run-name: "release: ${{ inputs.bump }}"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version part to bump'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # fetch all history for all tags and branches

      - name: compute next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          latest_tag=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          major="${version%%.*}"
          rest="${version#*.}"
          minor="${rest%%.*}"
          patch="${rest#*.}"

          # force base-10 interpretation so leading zeros are never treated as octal
          major=$((10#$major))
          minor=$((10#$minor))
          patch=$((10#$patch))

          case "$BUMP" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_tag="v${major}.${minor}.${patch}"
          echo "previous tag: ${latest_tag}, new tag: ${new_tag}"
          echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"

      - name: create and push tag
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          set -euo pipefail
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: create github release
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          set -euo pipefail
          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --generate-notes
