name: reusable-terraform-docs
run-name: "reusable-terraform-docs: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || github.ref_name }}"

on:
  workflow_call:
    inputs:
      find-dir:
        default: 'terraform/modules'
        description: 'Directory to find Terraform modules (relative to the repository root)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  terraform-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}

      - uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          args: --anchor=false
          find-dir: ${{ inputs.find-dir }}
          git-push: true
