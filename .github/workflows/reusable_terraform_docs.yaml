name: reusable-terraform-docs
run-name: "reusable-terraform-docs: ${{ github.ref_name }}"

on:
  workflow_call:
    inputs:
      find-dir:
        default: 'terraform/modules'
        description: 'Directory to find Terraform modules (relative to the repository root)'
        required: false
        type: string

concurrency:
  group: terraform-docs-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  terraform-docs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: docs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          args: --anchor=false
          find-dir: ${{ inputs.find-dir }}
          git-push: false

      # terraform-docs/gh-actions runs as root in its Docker container, so any files
      # it creates/modifies are root-owned. They need to be owned by the runner user
      # so the next step can commit them. https://github.com/terraform-docs/gh-actions/issues/50
      - name: set correct file ownership
        run: sudo chown -R "$(id -u):$(id -g)" .

      - if: startsWith(github.ref, 'refs/heads/') && steps.docs.outputs.num_changed != '0'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: terraform-docs-updates/${{ github.ref_name }}
          base: ${{ github.ref_name }}
          delete-branch: true
          commit-message: "terraform-docs: automated action"
          title: "terraform-docs: automated action"
          body: |
            Automated documentation update generated by [terraform-docs](https://github.com/terraform-docs/gh-actions) after changes were merged to `${{ github.ref_name }}`.
